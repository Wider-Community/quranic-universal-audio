<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600&family=Source+Sans+3:wght@400;500;600&display=swap');

#qua-dashboard {
  --qua-bg: #f5f2eb;
  --qua-card: #ffffff;
  --qua-border: #e2ddd4;
  --qua-text: #2c2c2c;
  --qua-muted: #7a7368;
  --qua-teal: #0d7377;
  --qua-teal-light: #e8f4f4;
  --qua-gold: #b8941f;
  --qua-gold-light: #fdf6e3;
  --qua-green: #1a7a3a;
  --qua-green-light: #e6f4ea;
  --qua-amber: #b86e00;
  --qua-amber-light: #fff3e0;
  --qua-blue: #1565c0;
  --qua-blue-light: #e3f2fd;
  --qua-gray: #6b7280;
  --qua-gray-light: #f3f4f6;
  --qua-radius: 12px;
  --qua-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --qua-shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
  font-family: 'Source Sans 3', system-ui, sans-serif;
  color: var(--qua-text);
  padding: 0;
}

/* ── Toolbar ── */
.dash-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  padding: 14px 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--qua-border);
}
.dash-toolbar input[type="search"] {
  flex: 1 1 220px;
  min-width: 180px;
  padding: 8px 14px;
  border: 1px solid var(--qua-border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--qua-card);
  outline: none;
  transition: border-color 0.2s;
}
.dash-toolbar input[type="search"]:focus {
  border-color: var(--qua-teal);
}
.dash-toolbar select {
  padding: 8px 12px;
  border: 1px solid var(--qua-border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--qua-card);
  cursor: pointer;
  min-width: 120px;
}
.dash-count {
  margin-left: auto;
  font-size: 13px;
  color: var(--qua-muted);
  white-space: nowrap;
}

/* ── Card Grid ── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px;
  padding-bottom: 20px;
}
.dash-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--qua-muted);
  font-size: 15px;
}

/* ── Card ── */
.reciter-card {
  background: var(--qua-card);
  border: 1px solid var(--qua-border);
  border-radius: var(--qua-radius);
  padding: 18px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s;
  box-shadow: var(--qua-shadow);
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.reciter-card:hover {
  box-shadow: var(--qua-shadow-hover);
  transform: translateY(-2px);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.card-name-block { flex: 1; min-width: 0; }
.card-name {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-name-ar {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 14px;
  color: var(--qua-muted);
  direction: rtl;
  margin-top: 2px;
}
.watch-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  font-size: 18px;
  color: var(--qua-muted);
  transition: color 0.2s, transform 0.2s;
  flex-shrink: 0;
}
.watch-btn:hover { color: var(--qua-gold); transform: scale(1.15); }
.watch-btn.watching { color: var(--qua-gold); }

/* ── Status Badge ── */
.status-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  width: fit-content;
}
.status-available { background: var(--qua-gray-light); color: var(--qua-gray); }
.status-pending { background: var(--qua-amber-light); color: var(--qua-amber); }
.status-awaiting-review { background: var(--qua-blue-light); color: var(--qua-blue); }
.status-completed { background: var(--qua-green-light); color: var(--qua-green); }

/* ── Tag Chips ── */
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  background: var(--qua-teal-light);
  color: var(--qua-teal);
  white-space: nowrap;
}
.tag-style { background: #f3e8ff; color: #7c3aed; }
.tag-source { background: #fef3c7; color: #92400e; }

/* ── Card Meta ── */
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 12px;
  color: var(--qua-muted);
  align-items: center;
  margin-top: auto;
}
.card-meta a {
  color: var(--qua-teal);
  text-decoration: none;
  font-weight: 500;
}
.card-meta a:hover { text-decoration: underline; }
.release-badge {
  background: var(--qua-gold-light);
  color: var(--qua-gold);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
}

/* ── Modal ── */
.dash-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9999;
}
.dash-modal.active { display: flex; align-items: center; justify-content: center; }
.modal-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
}
.modal-content {
  position: relative;
  background: var(--qua-card);
  border-radius: var(--qua-radius);
  padding: 28px;
  max-width: 520px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--qua-muted);
  padding: 4px;
}
.modal-close:hover { color: var(--qua-text); }
.modal-name { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
.modal-name-ar {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 18px;
  color: var(--qua-muted);
  direction: rtl;
  margin-bottom: 12px;
}
.modal-meta {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 16px;
  font-size: 14px;
  margin: 16px 0;
}
.modal-meta dt { font-weight: 600; color: var(--qua-muted); }
.modal-meta dd { margin: 0; }
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.modal-btn {
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--qua-border);
  background: var(--qua-card);
  color: var(--qua-text);
  transition: background 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.modal-btn:hover { background: var(--qua-gray-light); }
.modal-btn-primary {
  background: var(--qua-teal);
  color: white;
  border-color: var(--qua-teal);
}
.modal-btn-primary:hover { background: #0a5f62; }

@media (max-width: 640px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-toolbar { flex-direction: column; }
  .dash-toolbar select { width: 100%; }
}
</style>

<div id="qua-dashboard">
  <div class="dash-toolbar">
    <input type="search" id="dash-search" placeholder="Search reciters..." autocomplete="off">
    <select id="dash-status">
      <option value="">All Statuses</option>
      <option value="available">Available</option>
      <option value="pending">Pending</option>
      <option value="awaiting-review">Awaiting Review</option>
      <option value="completed">Completed</option>
    </select>
    <select id="dash-riwayah"><option value="">All Riwayat</option></select>
    <select id="dash-style"><option value="">All Styles</option></select>
    <select id="dash-source"><option value="">All Sources</option></select>
    <select id="dash-granularity">
      <option value="">All Granularities</option>
      <option value="by_surah">By Surah</option>
      <option value="by_ayah">By Ayah</option>
    </select>
    <span class="dash-count" id="dash-count"></span>
  </div>
  <div class="dash-grid" id="dash-grid"></div>
  <div class="dash-modal" id="dash-modal">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content" id="modal-body"></div>
  </div>
</div>

<script>
(function() {
  let ALL_DATA = [];
  const grid = document.getElementById('dash-grid');
  const modal = document.getElementById('dash-modal');
  const modalBody = document.getElementById('modal-body');
  const countEl = document.getElementById('dash-count');

  // ── Helpers ──
  function getProfile() {
    if (window.quaGetProfile) return window.quaGetProfile();
    try { return JSON.parse(localStorage.getItem('qua_reciter_profile') || '{}'); }
    catch(e) { return {}; }
  }

  function titleCase(s) {
    return (s || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function statusClass(s) {
    const map = {available:'available', pending:'pending', completed:'completed',
                 'awaiting-review':'awaiting-review', 'awaiting_review':'awaiting-review'};
    return 'status-' + (map[s] || 'available');
  }

  function statusLabel(s) {
    const map = {available:'Available', pending:'Pending', completed:'Completed',
                 'awaiting-review':'In Review', 'awaiting_review':'In Review',
                 processing:'Processing'};
    return map[s] || titleCase(s);
  }

  // ── Render ──
  function renderCards(data) {
    if (!data.length) {
      grid.innerHTML = '<div class="dash-empty">No reciters match your filters.</div>';
      countEl.textContent = '0 reciters';
      return;
    }
    countEl.textContent = data.length + ' reciter' + (data.length !== 1 ? 's' : '');
    const profile = getProfile();
    const watchSet = new Set(profile.watching || []);

    let html = '';
    for (const r of data) {
      const isWatching = r.watching || watchSet.has(r.slug);
      const coverageText = r.audio_cat === 'by_ayah'
        ? r.coverage + ' ayahs'
        : (r.coverage || 0) + '/114 surahs';

      html += '<div class="reciter-card" data-slug="' + r.slug + '">';
      html += '<div class="card-header"><div class="card-name-block">';
      html += '<p class="card-name" title="' + r.name_en + '">' + r.name_en + '</p>';
      if (r.name_ar) html += '<p class="card-name-ar">' + r.name_ar + '</p>';
      html += '</div>';
      html += '<button class="watch-btn' + (isWatching ? ' watching' : '') + '" data-slug="' + r.slug + '" data-name="' + r.name_en + '" title="' + (isWatching ? 'Unwatch' : 'Watch for updates') + '">' + (isWatching ? '\u2605' : '\u2606') + '</button>';
      html += '</div>';

      html += '<span class="status-badge ' + statusClass(r.status) + '">' + statusLabel(r.status) + '</span>';

      html += '<div class="card-tags">';
      if (r.riwayah_display && r.riwayah_display !== 'Unknown') html += '<span class="tag">' + r.riwayah_display + '</span>';
      if (r.style && r.style !== 'unknown') html += '<span class="tag tag-style">' + titleCase(r.style) + '</span>';
      if (r.source && r.source !== 'unknown') html += '<span class="tag tag-source">' + titleCase(r.source) + '</span>';
      html += '</div>';

      html += '<div class="card-meta">';
      html += '<span>' + coverageText + '</span>';
      if (r.release_version) {
        html += '<span class="release-badge">' + r.release_version + '</span>';
        if (r.release_count > 1) html += '<span>' + r.release_count + ' releases</span>';
      }
      if (r.download_url) html += '<a href="' + r.download_url + '" onclick="event.stopPropagation()" title="Download latest release">Download</a>';
      html += '</div></div>';
    }
    grid.innerHTML = html;

    // Attach card click handlers
    grid.querySelectorAll('.reciter-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.watch-btn') || e.target.tagName === 'A') return;
        const slug = card.dataset.slug;
        const rec = ALL_DATA.find(r => r.slug === slug);
        if (rec) showModal(rec);
      });
    });

    // Attach watch button handlers
    grid.querySelectorAll('.watch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleWatch(btn);
      });
    });
  }

  // ── Filter ──
  function getFiltered() {
    const search = document.getElementById('dash-search').value.toLowerCase();
    const status = document.getElementById('dash-status').value;
    const riwayah = document.getElementById('dash-riwayah').value;
    const style = document.getElementById('dash-style').value;
    const source = document.getElementById('dash-source').value;
    const gran = document.getElementById('dash-granularity').value;

    return ALL_DATA.filter(r => {
      if (search && !r.name_en.toLowerCase().includes(search)
          && !(r.name_ar && r.name_ar.includes(search))
          && !r.slug.includes(search)) return false;
      if (status && r.status !== status) return false;
      if (riwayah && r.riwayah !== riwayah) return false;
      if (style && r.style !== style) return false;
      if (source && r.source !== source) return false;
      if (gran && r.audio_cat !== gran) return false;
      return true;
    });
  }

  function applyFilters() { renderCards(getFiltered()); }

  // ── Populate filter dropdowns ──
  function populateFilters(data) {
    const sets = {riwayah: new Set(), style: new Set(), source: new Set()};
    for (const r of data) {
      if (r.riwayah && r.riwayah !== 'unknown') sets.riwayah.add(r.riwayah);
      if (r.style && r.style !== 'unknown') sets.style.add(r.style);
      if (r.source && r.source !== 'unknown') sets.source.add(r.source);
    }
    function fill(id, vals, displayFn) {
      const sel = document.getElementById(id);
      const first = sel.options[0];
      sel.innerHTML = '';
      sel.appendChild(first);
      for (const v of [...vals].sort()) {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = displayFn ? displayFn(v) : titleCase(v);
        sel.appendChild(opt);
      }
    }
    // Use riwayah_display for labels
    const riwMap = {};
    for (const r of data) { if (r.riwayah) riwMap[r.riwayah] = r.riwayah_display || titleCase(r.riwayah); }
    fill('dash-riwayah', sets.riwayah, v => riwMap[v] || titleCase(v));
    fill('dash-style', sets.style);
    fill('dash-source', sets.source);
  }

  // ── Modal ──
  function showModal(r) {
    const profile = getProfile();
    const isWatching = r.watching || (profile.watching || []).includes(r.slug);

    let html = '<button class="modal-close" id="modal-close-btn">&times;</button>';
    html += '<h2 class="modal-name">' + r.name_en + '</h2>';
    if (r.name_ar) html += '<p class="modal-name-ar">' + r.name_ar + '</p>';
    html += '<span class="status-badge ' + statusClass(r.status) + '">' + statusLabel(r.status) + '</span>';

    html += '<dl class="modal-meta">';
    html += '<dt>Riwayah</dt><dd>' + (r.riwayah_display || 'Unknown') + '</dd>';
    html += '<dt>Style</dt><dd>' + titleCase(r.style) + '</dd>';
    html += '<dt>Source</dt><dd>' + titleCase(r.source) + '</dd>';
    html += '<dt>Country</dt><dd>' + titleCase(r.country) + '</dd>';
    html += '<dt>Granularity</dt><dd>' + titleCase(r.audio_cat) + '</dd>';
    const covText = r.audio_cat === 'by_ayah' ? r.coverage + ' ayahs' : (r.coverage || 0) + '/114 surahs';
    html += '<dt>Coverage</dt><dd>' + covText + '</dd>';
    if (r.timestamp_level) {
      const tsLabel = r.timestamp_level === 'words_and_letters' ? 'Words + Letters' : 'Words only';
      html += '<dt>Timestamps</dt><dd>' + tsLabel + '</dd>';
    }
    if (r.release_version) {
      html += '<dt>Latest Release</dt><dd>' + r.release_version;
      if (r.release_count > 1) html += ' (' + r.release_count + ' releases)';
      html += '</dd>';
    }
    if (r.latest_release_date) html += '<dt>Last Updated</dt><dd>' + r.latest_release_date + '</dd>';
    if (r.created_at) html += '<dt>Requested</dt><dd>' + r.created_at + '</dd>';
    html += '</dl>';

    html += '<div class="modal-actions">';
    if (r.status === 'available') {
      html += '<button class="modal-btn modal-btn-primary" id="modal-request-btn" data-slug="' + r.slug + '">Submit Request</button>';
    }
    if (r.download_url) {
      html += '<a class="modal-btn" href="' + r.download_url + '">Download ' + (r.release_version || '') + '</a>';
    }
    if (r.issue_url) {
      html += '<a class="modal-btn" href="' + r.issue_url + '" target="_blank">Issue #' + r.issue_number + '</a>';
    }
    if (r.pr_url) {
      html += '<a class="modal-btn" href="' + r.pr_url + '" target="_blank">View PR</a>';
    }
    html += '<button class="modal-btn" id="modal-watch-btn" data-slug="' + r.slug + '" data-name="' + r.name_en + '">'
          + (isWatching ? '\u2605 Watching' : '\u2606 Watch') + '</button>';
    html += '</div>';

    modalBody.innerHTML = html;
    modal.classList.add('active');

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', closeModal);

    const reqBtn = document.getElementById('modal-request-btn');
    if (reqBtn) {
      reqBtn.addEventListener('click', () => {
        closeModal();
        // Write to the hidden prefill textbox and switch to Submit tab
        const prefillEl = document.querySelector('#prefill-slug textarea, #prefill-slug input');
        if (prefillEl) {
          prefillEl.value = reqBtn.dataset.slug;
          prefillEl.dispatchEvent(new Event('input', {bubbles: true}));
        }
        // Click the Submit Request tab
        const tabs = document.querySelectorAll('button[role="tab"]');
        if (tabs.length > 0) tabs[0].click();
      });
    }

    const watchBtn = document.getElementById('modal-watch-btn');
    if (watchBtn) watchBtn.addEventListener('click', () => toggleWatch(watchBtn));
  }

  function closeModal() { modal.classList.remove('active'); }

  // ── Watch Toggle ──
  function toggleWatch(btn) {
    const profile = getProfile();
    const email = (profile.email || '').trim();
    if (!email) {
      // Scroll to profile bar and highlight
      const emailInput = document.querySelector('#profile-email input, #profile-email textarea');
      if (emailInput) {
        emailInput.focus();
        emailInput.style.borderColor = '#b86e00';
        setTimeout(() => { emailInput.style.borderColor = ''; }, 2000);
      }
      return;
    }

    const slug = btn.dataset.slug;
    const displayName = btn.dataset.name || slug;
    const watching = btn.classList.contains('watching');

    if (watching) {
      // Unwatch
      fetch('/api/unwatch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email, target: slug, target_type: 'reciter'}),
      }).catch(() => {});
      btn.classList.remove('watching');
      btn.textContent = '\u2606';
      btn.title = 'Watch for updates';
      if (btn.id === 'modal-watch-btn') btn.innerHTML = '\u2606 Watch';
      // Update localStorage
      const w = (profile.watching || []).filter(s => s !== slug);
      if (window.quaSaveProfile) window.quaSaveProfile({watching: w});
      // Update data
      const rec = ALL_DATA.find(r => r.slug === slug);
      if (rec) rec.watching = false;
    } else {
      // Watch
      fetch('/api/watch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: email, target: slug, target_type: 'reciter',
          display_name: displayName, watcher_name: profile.name || '',
        }),
      }).catch(() => {});
      btn.classList.add('watching');
      btn.textContent = '\u2605';
      btn.title = 'Unwatch';
      if (btn.id === 'modal-watch-btn') btn.innerHTML = '\u2605 Watching';
      // Update localStorage
      const w = [...new Set([...(profile.watching || []), slug])];
      if (window.quaSaveProfile) window.quaSaveProfile({watching: w});
      // Update data
      const rec = ALL_DATA.find(r => r.slug === slug);
      if (rec) rec.watching = true;
    }
  }

  // ── Init ──
  function init() {
    const profile = getProfile();
    const email = (profile.email || '').trim();
    const url = '/api/dashboard-data' + (email ? '?email=' + encodeURIComponent(email) : '');

    fetch(url)
      .then(r => r.json())
      .then(data => {
        ALL_DATA = data.reciters || [];
        // Merge localStorage watch cache
        const localWatching = new Set(profile.watching || []);
        for (const r of ALL_DATA) {
          if (localWatching.has(r.slug)) r.watching = true;
        }
        populateFilters(ALL_DATA);
        applyFilters();
      })
      .catch(err => {
        grid.innerHTML = '<div class="dash-empty">Failed to load dashboard data. Try refreshing.</div>';
        console.error('Dashboard load error:', err);
      });

    // Attach filter listeners
    ['dash-search', 'dash-status', 'dash-riwayah', 'dash-style', 'dash-source', 'dash-granularity'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener(el.type === 'search' || el.tagName === 'INPUT' ? 'input' : 'change', applyFilters);
    });

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  }

  // Run init when DOM ready or on Gradio tab switch
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
