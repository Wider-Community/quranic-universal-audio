# Inspector — reviewer-facing compose file.
#
# Usage:
#   1. Put this file next to a `data/` directory containing the recitation data.
#   2. `docker compose up` → http://localhost:5000
#
# No repo clone needed — the image is published to GHCR. Image is
# auto-rebuilt by .github/workflows/docker-publish.yml on pushes to main.
#
# TEMP: pinned to :inspector-refactor while CI is being validated on that
# branch. Flip to :latest once the branch merges to main.

services:
  inspector:
    image: ghcr.io/wider-community/inspector:inspector-refactor
    container_name: inspector
    pull_policy: always
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    restart: unless-stopped
