name: Update Reciter Counts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/audio/**/*.json'
      - 'data/recitation_segments/**/segments.json'
      - 'data/timestamps/**/timestamps.json'
      - 'data/timestamps/**/timestamps_full.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-reciters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffprobe
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg > /dev/null

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Regenerate RECITERS.md and update README badges
        run: python scripts/list_reciters.py --write

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          branch="auto/update-reciter-counts"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/RECITERS.md README.md data/.audio_durations.json data/reciters_index.json
          git commit -m "docs: update reciter counts"
          git push -f origin "$branch"

          # Reuse existing PR or create a new one
          existing=$(gh pr list --head "$branch" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -z "$existing" ]; then
            gh pr create \
              --title "docs: update reciter counts" \
              --body-file .github/templates/workflows/update-reciters-pr.md \
              --head "$branch" \
              --base main
          fi

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          branch="auto/update-reciter-counts"
          existing=$(gh pr list --head "$branch" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh pr merge "$branch" --auto --squash --delete-branch || \
              gh pr merge "$branch" --squash --delete-branch
          fi
