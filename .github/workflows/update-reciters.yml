name: Update Reciter Counts

on:
  push:
    branches: [main]
    paths:
      - 'data/audio/**/*.json'
      - 'data/recitation_segments/**/segments.json'
      - 'data/timestamps/**/timestamps.json'
      - 'data/timestamps/**/timestamps_full.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-reciters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate RECITERS.md and update README badges
        run: python scripts/list_reciters.py --write

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          branch="auto/update-reciter-counts"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/RECITERS.md README.md
          git commit -m "docs: update reciter counts"
          git push -f origin "$branch"

          # Close any existing PR from this branch
          existing=$(gh pr list --head "$branch" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh pr close "$existing" --delete-branch || true
          fi

          gh pr create \
            --title "docs: update reciter counts" \
            --body "Auto-generated by CI after data changes." \
            --head "$branch" \
            --base main

          gh pr merge "$branch" --auto --squash --delete-branch
