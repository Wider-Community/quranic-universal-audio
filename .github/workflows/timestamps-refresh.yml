name: Refresh Timestamps

on:
  workflow_dispatch:
    inputs:
      reciter:
        description: 'Reciter slug to refresh (blank = auto-detect from recent changes)'
        required: false
      surahs:
        description: 'Comma-separated surah numbers (blank = auto-detect from segment diff)'
        required: false
  push:
    branches: [main]
    paths:
      - 'data/recitation_segments/**/segments.json'

permissions:
  contents: write
  issues: write

concurrency:
  group: timestamps-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg > /dev/null
          pip install numpy requests

      - name: Detect changed reciters and surahs
        id: detect
        run: |
          # Manual trigger with explicit reciter/surahs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            reciter="${{ github.event.inputs.reciter }}"
            surahs="${{ github.event.inputs.surahs }}"
            if [ -n "$reciter" ] && [ -n "$surahs" ]; then
              echo "entries=$reciter=$surahs" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "Manual: $reciter surahs=$surahs"
              exit 0
            fi
          fi

          # Guard: skip if timestamps were also changed in this push
          if [ "${{ github.event_name }}" = "push" ]; then
            ts_changed=$(git diff ${{ github.event.before }}..${{ github.sha }} \
              --name-only -- 'data/timestamps/' | wc -l)
            if [ "$ts_changed" -gt 0 ]; then
              echo "Timestamps also changed in this push — skipping refresh"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Auto-detect from git diff
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          # Find changed segments.json files
          changed_files=$(git diff "$before".."$after" --name-only \
            -- 'data/recitation_segments/*/segments.json' 2>/dev/null || true)

          if [ -z "$changed_files" ]; then
            echo "No segments.json files changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          entries=""
          for f in $changed_files; do
            reciter=$(echo "$f" | sed -E 's|data/recitation_segments/([^/]+)/segments.json|\1|')

            # Check if this reciter has tracked timestamps
            ts_exists=false
            for ts_dir in data/timestamps/by_surah_audio data/timestamps/by_ayah_audio; do
              if [ -f "$ts_dir/$reciter/timestamps.json" ]; then
                ts_exists=true
                break
              fi
            done
            if [ "$ts_exists" = "false" ]; then
              echo "Skipping $reciter: no tracked timestamps"
              continue
            fi

            # Detect changed surahs
            output=$(python3 scripts/detect_stale_timestamps.py "$before" "$f" 2>/dev/null) || continue
            surahs=$(echo "$output" | grep '^surahs=' | cut -d= -f2)

            if [ -n "$surahs" ]; then
              changed_line=$(echo "$output" | grep '^changed=' | cut -d= -f2)
              echo "$reciter: surahs=$surahs (changed: $changed_line)"
              entries="$entries $reciter=$surahs"
            fi
          done

          entries=$(echo "$entries" | xargs)
          if [ -z "$entries" ]; then
            echo "No stale timestamps detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "entries=$entries" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Refresh timestamps via MFA
        if: steps.detect.outputs.has_changes == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for entry in ${{ steps.detect.outputs.entries }}; do
            reciter=$(echo "$entry" | cut -d= -f1)
            surahs=$(echo "$entry" | cut -d= -f2)
            echo "::group::Refreshing $reciter (surahs: $surahs)"
            python3 extract_timestamps.py \
              --input "data/recitation_segments/$reciter/" \
              --refresh-surahs "$surahs"
            echo "::endgroup::"
          done

      - name: Commit and push
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          if git diff --quiet data/timestamps/; then
            echo "No timestamp changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build commit message with details
          changed_reciters=""
          for entry in ${{ steps.detect.outputs.entries }}; do
            reciter=$(echo "$entry" | cut -d= -f1)
            surahs=$(echo "$entry" | cut -d= -f2)
            changed_reciters="$changed_reciters\n- $reciter (surahs: $surahs)"
          done

          git add data/timestamps/
          git commit -m "$(cat <<EOF
          chore(timestamps): refresh MFA for edited segments

          Auto-triggered by segment changes.
          $(echo -e "$changed_reciters")
          EOF
          )"
          git push

      - name: Update issue labels
        if: steps.detect.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find issues with awaiting-timestamps label and update
          issues=$(gh issue list --label "status:awaiting-timestamps" --json number -q '.[].number' 2>/dev/null || true)
          for issue in $issues; do
            gh issue edit "$issue" \
              --remove-label "status:awaiting-timestamps" \
              --add-label "status:timestamped" 2>/dev/null || true
          done
