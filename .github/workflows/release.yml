name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. v0.2.0). Leave empty for auto.'
        required: false
        type: string
  workflow_run:
    workflows: ["Sync HF Dataset"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tags

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Package release
        id: package
        run: |
          args=""
          if [ -n "${{ inputs.version }}" ]; then
            args="--version ${{ inputs.version }}"
          fi
          python scripts/package_release.py $args --output-dir dist

          # Read computed version from manifest (if it exists)
          if [ -f dist/manifest.json ]; then
            version=$(python -c "import json; print(json.load(open('dist/manifest.json'))['version'])")
            count=$(python -c "import json; print(len(json.load(open('dist/manifest.json'))['reciters']))")
            echo "version=$version" >> $GITHUB_OUTPUT
            echo "count=$count" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "No changes since last release"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.package.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${{ steps.package.outputs.version }}

          # Create and push tag
          git tag "$version"
          git push origin "$version"

          # Create release with all assets
          gh release create "$version" \
            --title "$version" \
            --notes-file dist/release_notes.md \
            dist/*.zip dist/manifest.json dist/surah_info.json dist/qpc_hafs.json

          echo "Created release $version with ${{ steps.package.outputs.count }} reciter(s)"

      - name: Tag HF dataset and update version
        if: steps.package.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          import os, re
          api = HfApi(token=os.environ['HF_TOKEN'])
          version = '${{ steps.package.outputs.version }}'
          repo = 'hetchyy/quranic-universal-ayahs'

          # Tag
          try:
              api.create_tag(repo, repo_type='dataset', tag=version, tag_message=f'Release {version}')
              print(f'Tagged HF dataset with {version}')
          except Exception as e:
              print(f'Warning: Could not tag HF dataset: {e}')

          # Update version in dataset README
          try:
              readme = api.hf_hub_download(repo, 'README.md', repo_type='dataset')
              with open(readme) as f:
                  content = f.read()
              content = re.sub(r'version: v[\d.]+', f'version: {version}', content)
              api.upload_file(
                  path_or_fileobj=content.encode(),
                  path_in_repo='README.md',
                  repo_id=repo,
                  repo_type='dataset',
                  commit_message=f'Update version to {version}',
              )
              print(f'Updated dataset README version to {version}')
          except Exception as e:
              print(f'Warning: Could not update dataset README: {e}')
          "

      - name: Update release history cache
        if: steps.package.outputs.skip != 'true'
        run: |
          python -c "
          import json
          from pathlib import Path
          from datetime import date

          manifest = json.loads(Path('dist/manifest.json').read_text())
          cache_path = Path('data/.release_history.json')
          cache = json.loads(cache_path.read_text()) if cache_path.exists() else {}

          version = manifest['version']
          today = date.today().isoformat()

          for rec in manifest.get('reciters', []):
              slug = rec['slug']
              if slug not in cache:
                  cache[slug] = {
                      'release_count': 0,
                      'first_release': version,
                      'first_release_date': today,
                  }
              cache[slug]['release_count'] = cache[slug].get('release_count', 0) + 1
              cache[slug]['latest_release'] = version
              cache[slug]['latest_release_date'] = today
              cache[slug]['latest_download_url'] = rec.get('download_url', '')
              cache[slug]['latest_zip_sha256'] = rec.get('zip_sha256', '')

          cache_path.write_text(json.dumps(cache, indent=2, sort_keys=True) + '\n')
          print(f'Updated release history: {len(manifest.get(\"reciters\", []))} reciters in {version}')
          "

          # Commit the updated cache
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/.release_history.json
          git diff --cached --quiet || git commit -m "chore: update release history cache for ${{ steps.package.outputs.version }}"
          git push origin HEAD:main || echo "Warning: Could not push release history update"
