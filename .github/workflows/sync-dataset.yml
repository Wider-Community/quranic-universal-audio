name: Sync HF Dataset

on:
  workflow_dispatch:
    inputs:
      reciter:
        description: 'Reciter slug (blank = all eligible reciters)'
        required: false
      full_rebuild:
        description: 'Force full audio re-download (skip smart reuse)'
        type: boolean
        default: false
      readme_only:
        description: 'Only update dataset README (no reciter data)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'data/timestamps/**/*.json'
      - 'data/audio/**/*.json'

permissions:
  contents: read

concurrency:
  group: sync-dataset
  cancel-in-progress: false

jobs:
  sync-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for before..after diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Python dependencies
        run: pip install "datasets>=3.0,<4.0" huggingface_hub pydub soundfile pyyaml

      - name: Detect changed reciters
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            reciter="${{ github.event.inputs.reciter }}"
            if [ -n "$reciter" ]; then
              eligible="$reciter"
            else
              eligible=$(python -c "
          import sys; sys.path.insert(0, 'scripts')
          from build_reciter import find_eligible_reciters
          print(' '.join(find_eligible_reciters()))
          ")
            fi
            deleted=""
          else
            # Push trigger: detect from git diff
            changed=$(git diff ${{ github.event.before }}..${{ github.sha }} --name-only | \
              grep -E "data/(timestamps|recitation_segments|audio)/" | \
              sed -E 's|data/timestamps/[^/]+/([^/]+)/.*|\1|; s|data/recitation_segments/([^/]+)/.*|\1|; s|data/audio/[^/]+/[^/]+/([^/]+)\.json|\1|' | \
              sort -u | tr '\n' ' ')

            # Filter to only eligible reciters (must have timestamps)
            eligible=""
            for slug in $changed; do
              if [ -f "data/timestamps/by_ayah_audio/$slug/timestamps.json" ] || \
                 [ -f "data/timestamps/by_surah_audio/$slug/timestamps.json" ]; then
                eligible="$eligible $slug"
              fi
            done
            eligible=$(echo "$eligible" | xargs)

            # Detect deleted timestamp dirs
            deleted=$(git diff ${{ github.event.before }}..${{ github.sha }} --diff-filter=D --name-only | \
              grep "data/timestamps/" | \
              sed -E 's|data/timestamps/[^/]+/([^/]+)/.*|\1|' | \
              sort -u | tr '\n' ' ')
          fi

          echo "slugs=$(echo $eligible | xargs)" >> $GITHUB_OUTPUT
          echo "deleted=$(echo $deleted | xargs)" >> $GITHUB_OUTPUT
          echo "Changed reciters: $eligible"
          echo "Deleted reciters: $deleted"

      - name: Build and upload changed reciters
        if: steps.detect.outputs.slugs != '' && github.event.inputs.readme_only != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          flags=""
          if [ "${{ github.event.inputs.full_rebuild }}" = "true" ]; then
            flags="--full-rebuild"
          fi
          for slug in ${{ steps.detect.outputs.slugs }}; do
            echo "Building $slug..."
            python scripts/build_reciter.py $flags "$slug"
          done

      - name: Delete removed reciters
        if: steps.detect.outputs.deleted != '' && github.event.inputs.readme_only != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for slug in ${{ steps.detect.outputs.deleted }}; do
            echo "Deleting $slug..."
            python scripts/build_reciter.py --delete "$slug"
          done

      - name: Rebuild reciters catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/build_reciter.py --reciters-config
