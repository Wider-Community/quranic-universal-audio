name: Sync HF Dataset

on:
  push:
    branches: [main]
    paths:
      - 'data/timestamps/**'
      - 'data/recitation_segments/**'

permissions:
  contents: read

jobs:
  sync-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install datasets huggingface_hub pydub

      - name: Detect changed reciters
        id: detect
        run: |
          # Extract reciter slugs from changed timestamp/segment paths
          changed=$(git diff HEAD~1 --name-only | \
            grep -E "data/(timestamps|recitation_segments)/" | \
            sed -E 's|data/timestamps/[^/]+/([^/]+)/.*|\1|; s|data/recitation_segments/([^/]+)/.*|\1|' | \
            sort -u | tr '\n' ' ')

          # Filter to only eligible reciters (must have timestamps)
          eligible=""
          for slug in $changed; do
            if [ -f "data/timestamps/by_ayah_audio/$slug/timestamps_full.json" ] || \
               [ -f "data/timestamps/by_surah_audio/$slug/timestamps_full.json" ]; then
              eligible="$eligible $slug"
            fi
          done
          eligible=$(echo "$eligible" | xargs)
          echo "slugs=$eligible" >> $GITHUB_OUTPUT

          # Detect deleted timestamp dirs
          deleted=$(git diff HEAD~1 --diff-filter=D --name-only | \
            grep "data/timestamps/" | \
            sed -E 's|data/timestamps/[^/]+/([^/]+)/.*|\1|' | \
            sort -u | tr '\n' ' ')
          echo "deleted=$(echo $deleted | xargs)" >> $GITHUB_OUTPUT

          echo "Changed reciters: $eligible"
          echo "Deleted reciters: $deleted"

      - name: Build and upload changed reciters
        if: steps.detect.outputs.slugs != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for slug in ${{ steps.detect.outputs.slugs }}; do
            echo "Building $slug..."
            python dataset/build_reciter.py "$slug"
          done

      - name: Delete removed reciters
        if: steps.detect.outputs.deleted != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for slug in ${{ steps.detect.outputs.deleted }}; do
            echo "Deleting $slug..."
            python dataset/build_reciter.py --delete "$slug"
          done
