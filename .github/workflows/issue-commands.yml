name: Issue Commands
on:
  issue_comment:
    types: [created]
  # NOTE: Manual assignment via GitHub UI does NOT swap reviewer-needed →
  # reviewer-assigned. To handle that, an `issues: assigned` trigger would be
  # needed (see the label-on-assign job below).
  issues:
    types: [assigned]

jobs:
  # ── Swap label when someone is manually assigned ──────────────────────
  label-on-assign:
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'reviewer-needed')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name: 'reviewer-needed',
              });
            } catch (e) { /* label may already be gone */ }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: issueNumber, labels: ['reviewer-assigned'],
            });

  # ── Handle /claim and /confirm commands ───────────────────────────────
  handle-command:
    if: >-
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/claim') ||
       startsWith(github.event.comment.body, '/confirm'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const commenter = context.payload.comment.user.login;
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const labels = issue.labels.map(l => l.name);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function reply(body) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body,
              });
            }

            // Use PAT_TOKEN for collaborator check — the default GITHUB_TOKEN
            // only has issues:write permission which is insufficient for the
            // GET /repos/{owner}/{repo}/collaborators/{username} endpoint
            // (requires admin or read:org scope). Without PAT_TOKEN the check
            // silently returns false for everyone, sending invites to existing
            // collaborators.
            async function isCollaborator(username) {
              const resp = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/collaborators/${username}`,
                {
                  method: 'GET',
                  headers: {
                    'Authorization': `token ${process.env.PAT_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                  },
                },
              );
              if (resp.status === 204) return true;
              if (resp.status === 404) return false;
              throw new Error(`Collaborator check failed: ${resp.status}`);
            }

            async function hasPendingInvite(username) {
              try {
                const resp = await fetch(
                  `https://api.github.com/repos/${owner}/${repo}/invitations`,
                  {
                    headers: {
                      'Authorization': `token ${process.env.PAT_TOKEN}`,
                      'Accept': 'application/vnd.github.v3+json',
                    },
                  },
                );
                if (!resp.ok) return false;
                const invites = await resp.json();
                return invites.some(i => i.invitee && i.invitee.login === username);
              } catch (e) {
                return false;
              }
            }

            async function inviteCollaborator(username) {
              const resp = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/collaborators/${username}`,
                {
                  method: 'PUT',
                  headers: {
                    'Authorization': `token ${process.env.PAT_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                  },
                  body: JSON.stringify({ permission: 'write' }),
                },
              );
              if (!resp.ok) {
                const text = await resp.text();
                throw new Error(`${resp.status}: ${text}`);
              }
            }

            async function swapLabel(remove, add) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNumber, name: remove,
                });
              } catch (e) { /* label may not exist */ }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber, labels: [add],
              });
            }

            // Find an open PR that references this issue
            async function findLinkedPR() {
              try {
                const prs = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 50 });
                return prs.data.find(pr => pr.body && pr.body.includes(`Ref #${issueNumber}`)) || null;
              } catch (e) {
                return null;
              }
            }

            // Assign commenter to linked PR (best-effort)
            async function assignToLinkedPR(linkedPR) {
              if (!linkedPR) return;
              try {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number: linkedPR.number, assignees: [commenter],
                });
              } catch (e) { /* best-effort */ }
            }

            // Build a context-aware confirmation message
            function assignedMessage(linkedPR) {
              if (linkedPR) {
                return (
                  `@${commenter} You've been assigned as the reviewer! ` +
                  `Check out the [PR branch](${linkedPR.html_url}) and run the Inspector to review.`
                );
              }
              return (
                `@${commenter} You've been assigned as the reviewer! ` +
                `You'll be notified when segments are ready for review.`
              );
            }

            // ── /claim ──────────────────────────────────────────────────
            if (comment.startsWith('/claim')) {
              if (!labels.includes('reviewer-needed')) {
                await reply(
                  `@${commenter} This issue doesn't need a reviewer (missing \`reviewer-needed\` label).`
                );
                return;
              }

              // Check if commenter is already assigned
              const alreadyAssigned = issue.assignees.some(a => a.login === commenter);
              if (alreadyAssigned) {
                await reply(`@${commenter} You're already assigned to this issue.`);
                return;
              }

              if (issue.assignees.length > 0) {
                const assignee = issue.assignees[0].login;
                await reply(`@${commenter} This issue is already claimed by @${assignee}.`);
                return;
              }

              const collab = await isCollaborator(commenter);
              if (collab) {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number: issueNumber, assignees: [commenter],
                });
                await swapLabel('reviewer-needed', 'reviewer-assigned');

                const linkedPR = await findLinkedPR();
                await assignToLinkedPR(linkedPR);
                await reply(assignedMessage(linkedPR));
              } else {
                try {
                  await inviteCollaborator(commenter);
                  await reply(
                    `@${commenter} A collaborator invite has been sent! ` +
                    `Please [accept the invite](https://github.com/${owner}/${repo}/invitations), ` +
                    `then comment \`/confirm\` to get assigned.`
                  );
                } catch (e) {
                  await reply(
                    `@${commenter} Failed to send collaborator invite. ` +
                    `Please contact a maintainer.\n\n` +
                    `<details><summary>Error</summary>\n\n\`\`\`\n${e.message}\n\`\`\`\n</details>`
                  );
                }
              }
              return;
            }

            // ── /confirm ────────────────────────────────────────────────
            if (comment.startsWith('/confirm')) {
              const collab = await isCollaborator(commenter);
              if (collab) {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number: issueNumber, assignees: [commenter],
                });
                if (labels.includes('reviewer-needed')) {
                  await swapLabel('reviewer-needed', 'reviewer-assigned');
                }

                const linkedPR = await findLinkedPR();
                await assignToLinkedPR(linkedPR);
                await reply(assignedMessage(linkedPR));
              } else {
                // Check if there's actually a pending invite before telling
                // them to accept one — they may have skipped /claim entirely
                const pending = await hasPendingInvite(commenter);
                if (pending) {
                  await reply(
                    `@${commenter} It looks like you haven't accepted the collaborator invite yet. ` +
                    `Please [accept it here](https://github.com/${owner}/${repo}/invitations), ` +
                    `then comment \`/confirm\` again.`
                  );
                } else {
                  await reply(
                    `@${commenter} No pending invite found. Please comment \`/claim\` first to start the process.`
                  );
                }
              }
            }
