name: Collaborator Accepted
on:
  member:
    types: [added]

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const username = context.payload.member.login;
            const { owner, repo } = context.repo;

            // Find open issues with request-alignment label that mention this user
            // but don't have them assigned yet
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'request-alignment',
              per_page: 50,
            });

            for (const issue of issues.data) {
              if (issue.pull_request) continue;

              // Check if user is mentioned in issue body (from prepare-pr comment)
              // or if the issue body contains their GitHub username field
              const body = issue.body || '';
              const mentionsUser = body.includes(`@${username}`) ||
                body.includes(`**GitHub:** @${username}`);
              if (!mentionsUser) continue;

              // Skip if already assigned
              if (issue.assignees.some(a => a.login === username)) continue;

              // Assign to issue
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: issue.number, assignees: [username],
              });
              core.info(`Assigned @${username} to issue #${issue.number}`);

              // Swap label if needed
              const labels = issue.labels.map(l => l.name);
              if (labels.includes('reviewer-needed')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: issue.number, name: 'reviewer-needed',
                  });
                } catch (e) { /* may not exist */ }
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issue.number, labels: ['reviewer-assigned'],
                });
              }

              // Find and assign to linked PR
              const prs = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 50 });
              const linkedPR = prs.data.find(pr => pr.body && pr.body.includes(`Ref #${issue.number}`));
              if (linkedPR) {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number: linkedPR.number, assignees: [username],
                });
                core.info(`Assigned @${username} to PR #${linkedPR.number}`);
              }

              // Post a welcome comment
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: linkedPR
                  ? `@${username} Welcome! You've been assigned as the reviewer. Check out the [draft PR](${linkedPR.html_url}) and run the Inspector to review segments.`
                  : `@${username} Welcome! You've been assigned as the reviewer. You'll be notified when segments are ready.`,
              });
            }
