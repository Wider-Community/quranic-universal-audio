name: inspector-stage3
branch: inspector-refactor
worktree: refactor+inspector-modularize
plan_md: .refactor/stage3-plan.md
interview_summary: .refactor/stage3-interview.md
impl_model_default: sonnet
impl_model_override: mixed  # per-phase (see phases_consolidated), Opus for high-risk/long/logic-dense
phase_structure: 12_consolidated  # sub-phases in plan.md §2 retained as internal blueprint
shared_docs:
  decisions: .refactor/stage3-decisions.md
  bugs: .refactor/stage3-bugs.md

invariants:
  must:
    - behavior_preserved_all_tabs
    - api_signatures_unchanged
    - strict_typing_preserved
    - build_lint_typecheck_green
    - cache_py_single_owner
    - comments_why_not_what
    - prod_no_sourcemaps
  may:
    - src_segments_shared_styles_types_paths
    - refactor_noise_comments
    - services_internal_decomposition
    - vite_eslint_svelte_configs
    - claude_md_obsoleted_sections
  changing_by_phase: see plan §2

success_criteria:
  - name: no_src_segments
    grep: "-d inspector/frontend/src/segments"
  - name: no_src_shared
    grep: "-d inspector/frontend/src/shared"
  - name: no_src_types
    grep: "-d inspector/frontend/src/types"
  - name: styles_only_base
    grep: "inspector/frontend/src/styles/ has only base.css"
  - name: no_refactor_noise_in_code
    grep_cmd: "grep -rln -E '(Wave [0-9]|Stage [0-9]|S2-[A-Z]|refactored in|bridge for|\\(Wave|previously lived|moved from.*Wave|moved in Wave)' inspector/ --include='*.ts' --include='*.svelte' --include='*.py' | grep -v node_modules | grep -v '^\\.refactor/' | grep -v '/CLAUDE.md$'"
    expected: 0
  - name: no_imperative_dom_in_components
    grep_cmd: "grep -rn -E '\\.classList\\.|\\.querySelector|\\.querySelectorAll' inspector/frontend/src --include='*.ts' --include='*.svelte' | grep -v 'document.body' | grep -v 'lib/components/SearchableSelect\\.svelte'"
    expected: 0
  - name: no_segments_bridge_imports_in_lib_post_ph6
    grep_cmd: "grep -rn \"from ['\\\"].*segments/\" inspector/frontend/src/lib/"
    expected: 0
    applies_from: Ph6
  - name: b01_mapkey_cast_zero_post_ph4
    grep_cmd: "grep -rn 'String(.*) as unknown as number' inspector/frontend/src/"
    expected: 0
    applies_from: Ph4
  - name: main_chunk_under_300kb
    dir: inspector/frontend/dist
    main_chunk_max_kb: 300
  - name: animation_cadence_smoke
    manual_gate: Ph11
    description: "User verifies timestamps animation at 60fps under waveform scroll (reactive class:active cadence preserved)"
  - name: vite_sourcemap_gated
    file: inspector/frontend/vite.config.ts
    contains: "mode === 'development'"
  - name: vite_manualChunks_defined
    file: inspector/frontend/vite.config.ts
    contains: "manualChunks"
  - name: eslint_svelte_enabled
    file: inspector/frontend/eslint.config.js
    not_contains: "**/*.svelte"
    contains: "eslint-plugin-svelte"
  - name: validation_orchestrator_small
    file: inspector/services/validation/__init__.py
    max_loc: 200
  - name: undo_apply_reverse_small
    file: inspector/services/undo.py
    max_loc: 300
  - name: cache_py_factory_shrunk
    file: inspector/services/cache.py
    max_loc: 250
  - name: timestamps_tab_shrunk
    file: inspector/frontend/src/tabs/timestamps/TimestampsTab.svelte
    max_loc: 300
  - name: segments_tab_shrunk
    file: inspector/frontend/src/tabs/segments/SegmentsTab.svelte
    max_loc: 250
  - name: errorcard_dispatcher_small
    file: inspector/frontend/src/tabs/segments/validation/ErrorCard.svelte
    max_loc: 80
  - name: history_store_split
    alt:
      - file: inspector/frontend/src/lib/stores/segments/history.ts
        max_loc: 150
      - files:
        - inspector/frontend/src/lib/stores/segments/history-store.ts
        - inspector/frontend/src/lib/stores/segments/history-chains.ts
        - inspector/frontend/src/lib/stores/segments/history-items.ts
        max_loc_each: 280
  - name: as_unknown_as_casts_minimal
    grep_cmd: "grep -rn 'as unknown as' inspector/frontend/src/"
    expected_max: 5
  - name: bundle_js_under_400kb
    dir: inspector/frontend/dist
    main_chunk_max_kb: 400

phases_consolidated:  # 12-phase implementation view (impl agents dispatched per this list)

  - id: Ph1
    name: Foundation + Python backend
    rolls_up: [P0, P1a, P1b, P1c, P1d]
    impl_model: sonnet
    est_files: 30
    est_loc: -200
    est_minutes: 105
    risk: mixed_low_medium
    reviewers: [sonnet, haiku, opus]  # opus only for validation package split piece
    opus_verify_scope: [services/validation/*.py]
    split_trigger: {projected_minutes_over: 90}

  - id: Ph2
    name: Shell splits pre-bridge
    rolls_up: [P2a, P2b, P2c]
    impl_model: sonnet
    est_files: 12
    est_loc: -40
    est_minutes: 100
    risk: medium
    reviewers: [sonnet, opus]

  - id: Ph3
    name: segments pure leaves + mid-layer
    rolls_up: [P3a, P3b]
    impl_model: sonnet
    est_files: 22
    est_loc: 0
    est_minutes: 105
    risk: medium
    reviewers: [sonnet, opus, haiku]

  - id: Ph4
    name: segments edit + cross-cutting UI
    rolls_up: [P3c]
    impl_model: opus
    est_files: 18
    est_loc: 0
    est_minutes: 90
    risk: high
    reviewers: [sonnet, opus, haiku]
    split_trigger: {projected_minutes_over: 45, split_into: [Ph4a_edit_subtree, Ph4b_nav_kbd_eventdelegation_save]}

  - id: Ph5
    name: segments audio + data + history
    rolls_up: [P3d]
    impl_model: sonnet
    est_files: 10
    est_loc: 0
    est_minutes: 50
    risk: high
    reviewers: [sonnet, opus, haiku]

  - id: Ph6
    name: accordion + state.ts split + dir delete
    rolls_up: [P3e]
    impl_model: opus
    est_files: 10
    est_loc: -1000
    est_minutes: 45
    risk: high
    reviewers: [sonnet, opus, haiku]

  - id: Ph7
    name: legacy dirs + SegmentsTab finalize + store splits
    rolls_up: [P4, P5]
    impl_model: sonnet
    est_files: 35
    est_loc: -600
    est_minutes: 90
    risk: medium
    reviewers: [sonnet, haiku]

  - id: Ph8
    name: CSS low-risk batch
    rolls_up: [P6a, P6b, P6c]
    impl_model: sonnet
    est_files: 30
    est_loc: -730
    est_minutes: 95
    risk: low_medium
    reviewers: [sonnet, haiku]

  - id: Ph9
    name: CSS validation scoped
    rolls_up: [P6d]
    impl_model: opus
    est_files: 6
    est_loc: -300
    est_minutes: 40
    risk: high
    reviewers: [sonnet, haiku, opus]

  - id: Ph10
    name: CSS history + SegmentRow mode prop
    rolls_up: [P6e]
    impl_model: opus
    est_files: 8
    est_loc: -350
    est_minutes: 45
    risk: high
    reviewers: [sonnet, haiku, opus]

  - id: Ph11
    name: CSS timestamps + reactive Unified/Animation + segments edit-mode
    rolls_up: [P6f, P6g]
    impl_model: opus
    est_files: 10
    est_loc: -260
    est_minutes: 70
    risk: high
    reviewers: [sonnet, haiku, opus]
    split_trigger: {projected_minutes_over: 45, split_into: [Ph11a_unifieddisplay, Ph11b_animationdisplay_plus_segedit]}

  - id: Ph12
    name: final sweep + CLAUDE.md
    rolls_up: [P7]
    impl_model: sonnet
    est_files: 10
    est_loc: -100
    est_minutes: 30
    risk: low
    reviewers: [haiku, sonnet]

# Sub-phase blueprint retained below — agent implementations use the consolidated phase scope,
# but sub-phase structure is the dependency-order-safe internal plan.

