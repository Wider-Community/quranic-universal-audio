    baseline: 1
    target: 0
    tolerance: 0
  - id: SC-3
    metric: edits required to add a new category
    baseline: unknown
    target: 2 files (registry row + classifier rule), 0 test files
    tolerance: 0
  - id: SC-4
    metric: total inspector test cases
    baseline: ~9
    target: ≥ 150
    tolerance: -10%
  - id: SC-5
    metric: test pass rate at end of refactor
    baseline: n/a
    target: "100%"
    tolerance: 0
  - id: SC-6
    metric: UI sites mutating segments directly
    baseline: ~12
    target: 0
    tolerance: 0
  - id: SC-7
    metric: cache repair sites
    baseline: 4
    target: 0
    tolerance: 0
  - id: SC-8
    metric: validation issue identity scheme
    baseline: positional seg_index
    target: stable segment_uid (with seg_index display fallback)
    tolerance: binary
  - id: SC-9
    metric: file count in inspector/services/validation/
    baseline: 5
    target: ≤ 7
    tolerance: 2

testing_strategy:
  branch: "4d-recommended"
  notes: |
    Target-behavior TDD. Tests describe post-refactor target; broken-today cases use xfail
    with reason="phase-N". Each phase removes its xfail markers (verified by Sonnet quality
    reviewer). Two-tier registry tests: parametrized behavioral (read registry → consequences)
    + policy-snapshot test (pins literal matrix). Cross-stack parity tests share JSON fixtures
    between pytest and vitest.

stakeholders:
  contributors: [hetchyy]
  consumers_internal: [inspector frontend, validators CLI]
  consumers_external: []

shared_doc:
  type: bug-log
  path: .refactor/bug-log.md
  id_prefix: B
  protocol_notes: |
    Append-only. Seeded with B-1, B-2, B-3 from exploration findings. Implementation agents
    and reviewers append new entries. Pre-phase check verifies no unsubstituted fix-SHA
    placeholders.

stop_points:
