# .refactor/plan.yaml — Inspector Segments Refactor (machine-readable mirror of plan.md)
name: inspector-segments-refactor
created: 2026-04-25
subtype_primary: monolith-split
subtype_secondary: pattern-replacement

goals:
  - Eliminate domain-rule fragmentation across frontend, backend, CLI for validation categories.
  - Single Issue Registry drives accordion order, card type, Ignore visibility, auto-suppress, persistence.
  - Unified backend classifier; CLI imports it; frontend stops live-segment classification.
  - Command application layer; UI dispatches commands; segments are not mutated directly.
  - Normalized segment state with stable segment_uid identity.
  - Patch-based undo (forward-only) replaces field-by-field reconstruction.
  - Validation issues reference segments by segment_uid; positional seg_index falls back for legacy issues.
  - Adding a new validation category requires only a registry row + classifier rule.

non_goals:
  - Changing the inspector's HTTP surface (route URLs, response field set).
  - Migrating Flask → FastAPI or Svelte 4 → Svelte 5.
  - Touching the timestamps tab or audio tab.
  - Reworking authentication or static-asset pipeline.
  - Backfilling patch-based undo to pre-refactor history records.

invariants:
  must:
    - id: MUST-1
      statement: All inspector HTTP routes accept the same request shapes and return the same response field set as before. Additive only; no removed/renamed fields.
      testable_via: "test_routes_*.py schema-snapshot tests on every route; baseline frozen before Phase 1."
    - id: MUST-2
      statement: detailed.json on-disk schema is additive-only. segment_uid, ignored_categories, wrap_word_ranges, confidence, time_*, matched_* retain shape and semantics.
      testable_via: "test_persistence_schema.py round-trip + key-set parity."
    - id: MUST-3
      statement: segments.json on-disk format unchanged (verse_key → tuples + _meta).
      testable_via: "test_segments_json.py rebuild parity."
    - id: MUST-4
      statement: segment_uid is stable across reload+save cycles. Existing UIDs never regenerated; missing UIDs deterministically backfilled and stable on subsequent reloads.
      testable_via: "test_uid_stability.py: load → save → load → assert UIDs equal."
    - id: MUST-5
      statement: Ignore button visibility on every category card matches IssueRegistry[category].canIgnore.
      testable_via: "Parametrized vitest: every category, button presence/absence."
    - id: MUST-6
      statement: After Phase 2, backend classifier and CLI classifier produce identical category sets for any fixture. Frontend reads backend DTOs only.
      testable_via: "test_classifier_parity_backend_cli.py: same fixture, equal output."
    - id: MUST-7
      statement: "Empty ignored_categories array on save = clear persisted ignores. Omitted key = preserve existing. ['_all'] retains 'ignore everything' semantics."
      testable_via: "test_save_clears_ignores.py: 3 explicit cases."
    - id: MUST-8
      statement: After Phase 5, undo applies a complete inverse patch; pre-Phase-5 batches keep legacy field-restore. Forward-only.
      testable_via: "test_patch_undo.py: every command type round-trips."
    - id: MUST-9
      statement: After Phase 6, validation issues reference segments by segment_uid (with seg_index fallback for legacy). Stale items hidden, not rendered.
      testable_via: "test_validation_identity.py: structural edit on fixture; assert stale items filtered."
    - id: MUST-10
      statement: Adding a new category requires changes in exactly two files (registry row + classifier rule). Test suite picks it up via parametrization.
      testable_via: "SC-3 manual exercise — add tashkeel_drift, count edited files."
    - id: MUST-11
      statement: |
        No refactor-trace breadcrumbs in code or doc artifacts after Phase 6. Forbidden in NEW lines
        introduced by the refactor (case-insensitive): "// refactored", "// removed", "# refactored",
        "# removed", "(was X before)", "previously this", "previously did", "now uses the new",
        "now dispatches via", "migrated from", "replaced by", "superseded by Phase",
        "before this refactor", "as of Phase N", "legacy <Foo> handling". Pre-existing technical
        comments that happen to use historical phrasing to explain WHY are NOT targeted; only
        breadcrumbs left by this refactor's diff. Sonnet quality reviewer flags every phase.
      testable_via: |
        Stage 5: `git diff main...HEAD --no-color | grep -E '^\+' | grep -inE '<forbidden patterns>'`
        returns empty. Allow-list: .refactor/, inspector/tests/fixtures/, docs/inspector-segments-refactor-plan.md.
  may:
    - id: MAY-1
      statement: Internal module organization within validation/, segments/ tabs/, validators/.
    - id: MAY-2
      statement: Private helper signatures and call-site narrowing style.
    - id: MAY-3
      statement: Comment wording, placement, doc-strings.
    - id: MAY-4
      statement: _byChapter / _byChapterIndex cache fields — replaced or hidden in Phase 4.
    - id: MAY-5
      statement: Frontend _classifySegCategories — removed in Phase 2.
    - id: MAY-6
      statement: Internal store layout (denormalized → normalized) so long as compat selectors preserve $segData/$segAllData read shape.
    - id: MAY-7
      statement: Operation-log entry shape can grow new optional fields (e.g., before_patch / after_patch in Phase 5) but cannot remove existing.
    - id: MAY-8
      statement: History record can grow new fields (e.g., classified_issues snapshot in Phase 2) but cannot remove existing.
    - id: MAY-9
      statement: CLI validator output formatting; only category counts must match backend.
    - id: MAY-10
      statement: Validation API responses and history record snapshots may carry classified_issues string[]. This field is NEVER persisted into detailed.json (only validation responses + history snapshots). MUST-2 holds for detailed.json.
  changing:
    - id: IS-1
      statement: Introduce IssueRegistry (Python + TS twin) as single source of truth for category metadata. Replace scattered category checks.
      phases: [1]
    - id: IS-2
      statement: CLI validator imports backend classifier. Duplicated helpers deleted from CLI.
      phases: [2]
    - id: IS-3
      statement: Frontend _classifySegCategories removed. Live-segment classification comes only from backend. Snapshot classification reads stored classified_issues.
      phases: [2]
    - id: IS-4
      statement: Validation API responses gain classified_issues per snapshot. History records persist this field.
      phases: [2]
    - id: IS-5
      statement: Introduce SegmentCommand union and applyCommand reducer. UI dispatches commands.
      phases: [3]
    - id: IS-6
      statement: trim/split/merge/editReference/delete/ignoreIssue migrated to dispatch through applyCommand. UI components stop mutating segments directly.
      phases: [3]
    - id: IS-7
      statement: Introduce SegmentState{byId, idsByChapter, selectedChapter}. Compat selectors preserve $segData/$segAllData. Caches retired.
      phases: [4]
    - id: IS-8
      statement: Loader backfills segment_uid deterministically when absent. Persists on next save.
      phases: [4]
    - id: IS-9
      statement: Commands produce SegmentPatch{before, after, removedIds, insertedIds, affectedChapterIds}. History records gain optional patch field. Backend undo applies inverse patch when present.
      phases: [5]
    - id: IS-10
      statement: Validation DTO gains segment_uid on every issue. Frontend resolution uses uid first; falls back to seg_index for legacy. Stale issues filtered.
      phases: [6]
    - id: IS-11
      statement: _fixupValIndicesForSplit/Merge/Delete removed once all issues carry uid.
      phases: [6]

